<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mirondesk • Трансляция экрана</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0d13;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      max-width: 420px;
      width: 100%;
      background: #11161d;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .top-bar {
      background: #181f2a;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      background: #2563eb;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .brand-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
    }

    .connection-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: 0.3s;
    }

    .connection-dot.connected {
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
    }

    /* Экран */
    .screen-container {
      margin: 10px 12px;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #2a3341;
      aspect-ratio: 9/19;
      max-height: 550px;
      position: relative;
    }

    .screen-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .screen-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #4b5563;
      gap: 12px;
    }

    .screen-placeholder .icon-big {
      font-size: 4rem;
      opacity: 0.5;
    }

    .screen-placeholder .text {
      font-size: 0.9rem;
      text-align: center;
      padding: 0 20px;
    }

    /* Панель управления */
    .control-panel {
      padding: 0 12px 16px;
    }

    .id-display {
      background: #1a1f2b;
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      border: 1px solid #2a3341;
    }

    .id-label {
      font-size: 0.7rem;
      color: #6b7280;
      text-transform: uppercase;
    }

    .id-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      font-family: monospace;
    }

    .id-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .id-input {
      flex: 1;
      background: #1a1f2b;
      border: 1px solid #2a3341;
      border-radius: 12px;
      padding: 12px 14px;
      color: #fff;
      font-size: 1rem;
      font-family: monospace;
      outline: none;
      letter-spacing: 1px;
    }

    .id-input::placeholder {
      color: #4b5563;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      width: 100%;
    }

    .btn-primary:active {
      background: #1d4ed8;
      transform: scale(0.97);
    }

    .btn-primary:disabled {
      background: #374151;
      color: #6b7280;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
      width: 100%;
    }

    .btn-copy {
      background: #1e2736;
      color: #9ca3af;
      padding: 12px;
    }

    .btn-copy:active {
      background: #2a3341;
      color: #fff;
    }

    .status-text {
      text-align: center;
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 6px;
    }

    .role-selector {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .role-btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #2a3341;
      background: #1a1f2b;
      color: #9ca3af;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .role-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: #e5e7eb;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.85rem;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
      z-index: 100;
      border: 1px solid #374151;
    }

    .toast.show {
      opacity: 1;
      bottom: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Верхняя панель -->
    <div class="top-bar">
      <div class="brand">
        <div class="brand-icon">🔷</div>
        <span class="brand-name">Mirondesk</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="color:#9ca3af;font-size:0.8rem;" id="roleLabel">Выберите роль</span>
        <div class="connection-dot" id="connDot"></div>
      </div>
    </div>

    <!-- Экран -->
    <div class="screen-container" id="screenContainer">
      <video id="remoteVideo" autoplay playsinline muted style="display:none;"></video>
      <video id="localVideo" autoplay playsinline muted style="display:none;"></video>
      <div class="screen-placeholder" id="placeholder">
        <div class="icon-big">📱</div>
        <div class="text">Выберите роль и начните трансляцию экрана</div>
      </div>
    </div>

    <!-- Управление -->
    <div class="control-panel">
      <!-- Android режим -->
      <div id="androidPanel" style="display:none;">
        <div class="id-display">
          <div>
            <div class="id-label">Ваш ID</div>
            <div class="id-value" id="androidIdDisplay">428 175 930</div>
          </div>
          <button class="btn btn-copy" id="copyIdBtn">📋</button>
        </div>
        <button class="btn btn-primary" id="startShareBtn">
          📺 Начать трансляцию экрана
        </button>
        <button class="btn btn-danger" id="stopShareBtn" style="display:none;">
          ⏹ Остановить трансляцию
        </button>
        <p class="status-text" id="androidStatus">Нажмите кнопку для захвата экрана</p>
      </div>

      <!-- iPhone режим -->
      <div id="iphonePanel" style="display:none;">
        <div class="id-input-row">
          <input type="text" class="id-input" id="targetIdInput" placeholder="Введите ID Android" inputmode="numeric">
          <button class="btn btn-copy" id="pasteIdBtn">📋</button>
        </div>
        <button class="btn btn-primary" id="connectBtn">
          🔗 Подключиться и смотреть экран
        </button>
        <p class="status-text" id="iphoneStatus">Введите ID Android для просмотра экрана</p>
      </div>

      <!-- Выбор роли -->
      <div class="role-selector" id="roleSelector">
        <button class="role-btn" data-role="android">🤖 Я Android (трансляция)</button>
        <button class="role-btn" data-role="iphone">📱 Я iPhone (просмотр)</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // ============ КОНФИГУРАЦИЯ ============
      const ANDROID_ID = '428175930';
      const SIGNALING_SERVER = 'wss://mirondesk-signal.glitch.me'; // Публичный сигнальный сервер
      
      // ============ DOM ============
      const $ = (s) => document.querySelector(s);
      
      const connDot = $('#connDot');
      const roleLabel = $('#roleLabel');
      const screenContainer = $('#screenContainer');
      const remoteVideo = $('#remoteVideo');
      const localVideo = $('#localVideo');
      const placeholder = $('#placeholder');
      const androidPanel = $('#androidPanel');
      const iphonePanel = $('#iphonePanel');
      const roleSelector = $('#roleSelector');
      const androidIdDisplay = $('#androidIdDisplay');
      const copyIdBtn = $('#copyIdBtn');
      const startShareBtn = $('#startShareBtn');
      const stopShareBtn = $('#stopShareBtn');
      const androidStatus = $('#androidStatus');
      const targetIdInput = $('#targetIdInput');
      const connectBtn = $('#connectBtn');
      const pasteIdBtn = $('#pasteIdBtn');
      const iphoneStatus = $('#iphoneStatus');
      const toast = $('#toast');
      const roleBtns = document.querySelectorAll('.role-btn');
      
      // ============ ПЕРЕМЕННЫЕ ============
      let currentRole = null;
      let localStream = null;
      let peerConnection = null;
      let ws = null;
      let roomId = null;
      let isConnected = false;
      
      // ============ УТИЛИТЫ ============
      function showToast(msg, duration = 2500) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(window._t);
        window._t = setTimeout(() => toast.classList.remove('show'), duration);
      }
      
      function updateConnectionUI(connected) {
        isConnected = connected;
        if (connected) {
          connDot.classList.add('connected');
        } else {
          connDot.classList.remove('connected');
        }
      }
      
      // ============ СИГНАЛЬНЫЙ СЕРВЕР (WebSocket) ============
      function connectSignaling(room) {
        return new Promise((resolve, reject) => {
          try {
            ws = new WebSocket(SIGNALING_SERVER);
            
            ws.onopen = () => {
              ws.send(JSON.stringify({ type: 'join', room }));
              resolve();
            };
            
            ws.onmessage = async (event) => {
              const msg = JSON.parse(event.data);
              
              if (msg.type === 'offer') {
                await handleOffer(msg.sdp);
              } else if (msg.type === 'answer') {
                await handleAnswer(msg.sdp);
              } else if (msg.type === 'ice-candidate') {
                await handleIceCandidate(msg.candidate);
              } else if (msg.type === 'peer-joined') {
                if (currentRole === 'android' && localStream) {
                  await createPeerConnection();
                  await createOffer();
                }
              }
            };
            
            ws.onerror = () => reject(new Error('Ошибка сигнального сервера'));
            ws.onclose = () => console.log('Сигнальный сервер отключён');
            
          } catch (e) {
            reject(e);
          }
        });
      }
      
      function sendSignaling(data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(data));
        }
      }
      
      // ============ WebRTC ============
      async function createPeerConnection() {
        const config = {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        };
        
        peerConnection = new RTCPeerConnection(config);
        
        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            sendSignaling({
              type: 'ice-candidate',
              candidate: event.candidate,
              room: roomId
            });
          }
        };
        
        peerConnection.onconnectionstatechange = () => {
          if (peerConnection.connectionState === 'connected') {
            updateConnectionUI(true);
            if (currentRole === 'android') {
              androidStatus.textContent = '✅ iPhone смотрит ваш экран';
            } else {
              iphoneStatus.textContent = '✅ Просмотр экрана Android';
            }
            placeholder.style.display = 'none';
          } else if (peerConnection.connectionState === 'disconnected') {
            updateConnectionUI(false);
          }
        };
        
        peerConnection.ontrack = (event) => {
          if (currentRole === 'iphone') {
            remoteVideo.style.display = 'block';
            remoteVideo.srcObject = event.streams[0];
            placeholder.style.display = 'none';
            updateConnectionUI(true);
          }
        };
        
        // Если Android, добавляем локальный поток
        if (currentRole === 'android' && localStream) {
          localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
          });
        }
      }
      
      async function createOffer() {
        if (!peerConnection) return;
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        sendSignaling({ type: 'offer', sdp: offer, room: roomId });
      }
      
      async function handleOffer(sdp) {
        if (currentRole !== 'iphone') return;
        await createPeerConnection();
        await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        sendSignaling({ type: 'answer', sdp: answer, room: roomId });
      }
      
      async function handleAnswer(sdp) {
        if (!peerConnection) return;
        await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
      }
      
      async function handleIceCandidate(candidate) {
        if (!peerConnection) return;
        try {
          await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        } catch (e) {
          console.error('ICE candidate error:', e);
        }
      }
      
      // ============ ЗАХВАТ ЭКРАНА (ANDROID) ============
      async function startScreenCapture() {
        try {
          localStream = await navigator.mediaDevices.getDisplayMedia({
            video: {
              mediaSource: 'screen',
              width: { ideal: 720 },
              height: { ideal: 1280 },
              frameRate: { ideal: 30 }
            },
            audio: false
          });
          
          // Показываем локальное видео
          localVideo.style.display = 'block';
          localVideo.srcObject = localStream;
          placeholder.style.display = 'none';
          
          // Отслеживаем остановку трансляции пользователем
          localStream.getVideoTracks()[0].onended = () => {
            stopScreenShare();
          };
          
          startShareBtn.style.display = 'none';
          stopShareBtn.style.display = 'block';
          androidStatus.textContent = '📡 Экран транслируется. Ожидание зрителя...';
          updateConnectionUI(false);
          
          // Подключаемся к сигнальному серверу
          roomId = ANDROID_ID;
          await connectSignaling(roomId);
          
          showToast('📺 Захват экрана начат!');
          
        } catch (err) {
          console.error('Ошибка захвата экрана:', err);
          showToast('❌ Не удалось захватить экран. Разрешите доступ.');
          androidStatus.textContent = 'Ошибка: ' + err.message;
        }
      }
      
      function stopScreenShare() {
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
          localStream = null;
        }
        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }
        if (ws) {
          ws.close();
          ws = null;
        }
        
        localVideo.style.display = 'none';
        localVideo.srcObject = null;
        placeholder.style.display = 'flex';
        startShareBtn.style.display = 'block';
        stopShareBtn.style.display = 'none';
        androidStatus.textContent = 'Трансляция остановлена';
        updateConnectionUI(false);
        showToast('Трансляция экрана остановлена');
      }
      
      // ============ ПОДКЛЮЧЕНИЕ IPHONE ============
      async function connectToAndroid() {
        const targetId = targetIdInput.value.replace(/\s+/g, '');
        
        if (!targetId) {
          showToast('❌ Введите ID Android');
          return;
        }
        
        if (targetId !== ANDROID_ID) {
          showToast('❌ Неверный ID Android');
          return;
        }
        
        try {
          roomId = targetId;
          await connectSignaling(roomId);
          
          connectBtn.disabled = true;
          connectBtn.textContent = '⏳ Подключение...';
          iphoneStatus.textContent = 'Подключение к Android...';
          showToast('🔗 Подключение к экрану Android...');
          
          // Создаём peer connection для приёма видео
          await createPeerConnection();
          
        } catch (err) {
          console.error('Ошибка подключения:', err);
          iphoneStatus.textContent = 'Ошибка подключения';
          connectBtn.disabled = false;
          connectBtn.textContent = '🔗 Подключиться и смотреть экран';
          showToast('❌ Ошибка подключения: ' + err.message);
        }
      }
      
      // ============ ВЫБОР РОЛИ ============
      function setRole(role) {
        currentRole = role;
        
        roleBtns.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.role === role);
        });
        
        if (role === 'android') {
          androidPanel.style.display = 'block';
          iphonePanel.style.display = 'none';
          roleLabel.textContent = '🤖 Android';
          androidIdDisplay.textContent = ANDROID_ID.replace(/(\d{3})(\d{3})(\d{3})/, '$1 $2 $3');
          placeholder.querySelector('.icon-big').textContent = '📺';
          placeholder.querySelector('.text').textContent = 'Нажмите "Начать трансляцию" для захвата экрана';
        } else {
          androidPanel.style.display = 'none';
          iphonePanel.style.display = 'block';
          roleLabel.textContent = '📱 iPhone';
          placeholder.querySelector('.icon-big').textContent = '📱';
          placeholder.querySelector('.text').textContent = 'Введите ID Android для просмотра экрана';
          remoteVideo.style.display = 'none';
          localVideo.style.display = 'none';
        }
        
        // Сброс
        updateConnectionUI(false);
        placeholder.style.display = 'flex';
      }
      
      // ============ ОБРАБОТЧИКИ ============
      roleBtns.forEach(btn => {
        btn.addEventListener('click', () => setRole(btn.dataset.role));
      });
      
      startShareBtn.addEventListener('click', startScreenCapture);
      stopShareBtn.addEventListener('click', stopScreenShare);
      
      copyIdBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(ANDROID_ID).then(() => {
          showToast('📋 ID скопирован: ' + ANDROID_ID);
        });
      });
      
      pasteIdBtn.addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          targetIdInput.value = text.replace(/\s+/g, '');
          showToast('📋 Вставлено');
        } catch {
          showToast('Не удалось вставить');
        }
      });
      
      connectBtn.addEventListener('click', connectToAndroid);
      
      // ============ ИНИЦИАЛИЗАЦИЯ ============
      function init() {
        updateConnectionUI(false);
        
        // Пытаемся определить устройство
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        if (isAndroid) {
          setRole('android');
          showToast('Определён как Android устройство');
        } else if (isIOS) {
          setRole('iphone');
          showToast('Определён как iPhone устройство');
        }
      }
      
      init();
      
      // Очистка
      window.addEventListener('beforeunload', () => {
        stopScreenShare();
      });
      
    })();
  </script>
</body>
</html>
